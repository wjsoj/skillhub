services:
  postgres:
    # pgvector ships an official image bundled with the extension.
    image: pgvector/pgvector:pg16
    container_name: skillhub-pg
    environment:
      POSTGRES_USER: skillhub
      POSTGRES_PASSWORD: skillhub
      POSTGRES_DB: skillhub
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillhub"]
      interval: 2s
      timeout: 2s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: skillhub-redis
    ports:
      - "16379:6379"
    volumes:
      - redisdata:/data

# Skill content (SKILL.md, manifest) lives in Postgres as TEXT/JSONB, so the
# dev stack needs no object store. If you later add large binary attachments,
# bring back a MinIO/S3 service and point `[storage]` at it.

volumes:
  pgdata:
  redisdata:
