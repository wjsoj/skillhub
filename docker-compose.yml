version: "3.9"

services:
  postgres:
    # pgvector ships an official image bundled with the extension.
    image: pgvector/pgvector:pg16
    container_name: skillhub-pg
    environment:
      POSTGRES_USER: skillhub
      POSTGRES_PASSWORD: skillhub
      POSTGRES_DB: skillhub
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillhub"]
      interval: 2s
      timeout: 2s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: skillhub-redis
    ports:
      - "16379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: skillhub
      MINIO_ROOT_PASSWORD: skillhub-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  redisdata:
  miniodata:
