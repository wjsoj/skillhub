<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/skillhub-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fbfbf9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d0d0e" media="(prefers-color-scheme: dark)" />
    <title>SkillHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        var ls = localStorage.getItem("skillhub.theme");
        var sys = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        var t = ls === "light" || ls === "dark" ? ls : sys;
        if (t === "dark") document.documentElement.classList.add("dark");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
